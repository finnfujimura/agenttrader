<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agenttrader dashboard</title>
    <style>
      :root {
        --bg: #f6f4ef;
        --text: #1a1d22;
        --card: #ffffff;
        --muted: #616873;
        --accent: #0b6e4f;
        --line: #d8dce3;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, #e8f4ea, var(--bg));
        color: var(--text);
      }
      .shell { max-width: 1200px; margin: 0 auto; padding: 20px; }
      nav { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
      nav a {
        text-decoration: none;
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 14px;
      }
      .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
      .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .value { font-size: 22px; margin-top: 8px; font-weight: 700; }
      table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
      th { background: #f2f4f7; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .chart { width: 100%; height: 260px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 8px; }
      .log { max-height: 260px; overflow: auto; background: #111827; color: #e5e7eb; padding: 10px; border-radius: 8px; font-family: ui-monospace, monospace; font-size: 12px; }
      input { padding: 8px; border: 1px solid var(--line); border-radius: 8px; width: 260px; }
      @media (max-width: 640px) {
        .shell { padding: 14px; }
        th, td { font-size: 11px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>agenttrader dashboard</h1>
      <nav>
        <a href="#/">Overview</a>
        <a href="#/paper">Paper Trades</a>
        <a href="#/compare">Compare</a>
        <a href="#/backtests">Backtests</a>
        <a href="#/markets">Markets</a>
      </nav>
      <div id="app">Loading...</div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
